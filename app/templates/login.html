<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - ImmiAccount - Department of Home Affairs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">

<!-- ====== HEADER (minimal, no nav) ====== -->
<header class="site-header">
    <div class="header-inner">
        <div class="header-left">
            <div class="gov-branding">
                <div class="gov-crest">
                    <svg width="44" height="52" viewBox="0 0 44 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Australian Government Crest">
                        <path d="M2 2 H42 V30 Q42 50 22 50 Q2 50 2 30 Z" fill="none" stroke="white" stroke-width="2"/>
                        <line x1="22" y1="2" x2="22" y2="50" stroke="white" stroke-width="1"/>
                        <line x1="2" y1="22" x2="42" y2="22" stroke="white" stroke-width="1"/>
                        <circle cx="10" cy="12" r="1.5" fill="white"/>
                        <circle cx="14" cy="8" r="1.5" fill="white"/>
                        <circle cx="18" cy="12" r="1.5" fill="white"/>
                        <circle cx="14" cy="16" r="1.5" fill="white"/>
                        <circle cx="14" cy="12" r="1" fill="white"/>
                        <circle cx="28" cy="10" r="1.5" fill="white"/>
                        <circle cx="32" cy="14" r="1.5" fill="white"/>
                        <circle cx="36" cy="10" r="1.5" fill="white"/>
                        <circle cx="12" cy="35" r="1.5" fill="white"/>
                        <circle cx="22" cy="32" r="2" fill="white"/>
                        <circle cx="32" cy="35" r="1.5" fill="white"/>
                        <circle cx="17" cy="40" r="1" fill="white"/>
                        <circle cx="27" cy="40" r="1" fill="white"/>
                    </svg>
                </div>
                <div class="gov-text">
                    <span class="gov-name">Australian Government</span>
                    <span class="dept-name">Department of Home Affairs</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-user-row">&nbsp;</div>
            <div>
                <span class="gov-title">ImmiAccount</span>
            </div>
        </div>
    </div>
</header>

<!-- ====== LOGIN FORM ====== -->
<div class="login-wrapper">
    <div class="login-box">
        <div class="section-header">
            <h2>Sign in to ImmiAccount</h2>
            <span class="help-icon" title="Help">?</span>
        </div>
        <div class="login-form-inner">

            {% if timeout_msg %}
            <div class="login-timeout">{{ timeout_msg }}</div>
            {% endif %}

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password">
                </div>
                <div class="login-btn-row">
                    <button type="submit" class="btn btn-primary" style="padding: 5px 20px; font-size: 13px;">Sign in</button>
                </div>
            </form>

            <div class="login-help-text">
                Having trouble signing in? <a href="#">Contact the Department</a>.
            </div>
        </div>
    </div>
</div>

<!-- ====== FOOTER ====== -->
<footer class="site-footer">
    <a href="#">Accessibility</a>
    <a href="#">Online Security</a>
    <a href="#">Privacy</a>
    <a href="#">Copyright &amp; Disclaimer</a>
</footer>

</body>
</html>
